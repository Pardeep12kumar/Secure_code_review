{% extends "base.html" %}

{% block title %}
Upload Source Code
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Upload Source Code
                </h2>

                <form
                    method="POST"
                    enctype="multipart/form-data">

                    {{ form.hidden_tag() }}

                    <div class="mb-3">

                        {{ form.source_file.label(class="form-label") }}

                        {{ form.source_file(class="form-control") }}

                    </div>

                    <div class="d-grid">

                        {{ form.submit(class="btn btn-primary") }}

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
