{% extends "base.html" %}

{% block title %}
404 - Page Not Found
{% endblock %}

{% block content %}

<div class="text-center mt-5">

    <h1 class="display-1 text-danger">
        404

    <h3>

        Return Home

    </a>

</div>

{% endblock %}
